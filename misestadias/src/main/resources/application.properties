# =============================================
# MIS ESTADÍAS ? UTEZ
# application.properties
# =============================================

# --- SERVIDOR ---
server.port=8080

# --- DATASOURCE (Oracle) ---
# Formato SID:     jdbc:oracle:thin:@HOST:PORT:SID
# Formato Service: jdbc:oracle:thin:@//HOST:PORT/SERVICE_NAME
spring.datasource.url=jdbc:oracle:thin:@//HOST:PORT/SERVICE_NAME
spring.datasource.username=TU_USUARIO
spring.datasource.password=TU_CONTRASEŃA
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- JPA / HIBERNATE ---
# IMPORTANTE: En producción, cambiar a 'validate' o 'none'.
# 'create' borra y recrea tablas. 'update' solo ańade cambios.
# Como el DDL ya está definido, usamos 'validate' para que
# Hibernate solo compruebe que las tablas coinciden con las entidades.
spring.jpa.hibernate.ddl-auto=validate

# Dialecto para Oracle 12c+ (compatible con 19c, 21c)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Muestra el SQL generado por Hibernate en consola (útil para debug)
spring.jpa.show-sql=true

# Formatea el SQL en consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# --- NOMBRE DE LA APP ---
spring.application.name=misestadias

